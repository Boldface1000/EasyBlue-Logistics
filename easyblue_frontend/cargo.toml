[package]
name = "easyblue_frontend"
version = "0.1.0"
edition = "2021"
authors = ["Godwin Eferideoghene <ART1801999>"]
description = "Lead Developer - EasyBlue Logistics PWA"

[dependencies]
# 1. The Core UI Engine
dioxus = { version = "0.4", features = ["web", "router"] }

# 2. Networking & Data (The "Phone Line")
# Used in api.rs
gloo-net = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 3. Storage & Security (The "Security Guard")
# Used in auth.rs
gloo-storage = "0.3"

# 4. GPS & Browser Hardware (The "GPS Engine")
# Used in location.rs
wasm-bindgen = "0.2"
futures-channel = "0.3"
js-sys = "0.3"

# 5. Web-Sys (Crucial for Oppo A12 Hardware Access)
[dependencies.web-sys]
version = "0.3"
features = [
    "Window",
    "Navigator",
    "Geolocation",
    "Position",
    "PositionOptions",
    "Coordinates",
    "Storage",
    "HtmlElement",
    "DomTokenList"
]

[profile.release]
# Optimization for mobile data: Keeps the .wasm file as small as possible
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
